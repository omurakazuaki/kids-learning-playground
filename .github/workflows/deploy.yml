name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint slides
        run: pnpm lint

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: dist
          key: slidev-dist-${{ hashFiles('pnpm-lock.yaml', 'scripts/build-all.mjs') }}-${{ github.run_id }}
          restore-keys: |
            slidev-dist-${{ hashFiles('pnpm-lock.yaml', 'scripts/build-all.mjs') }}-
            slidev-dist-

      - name: Build all slides and generate index
        env:
          BUILD_CONCURRENCY: "2"
        run: node scripts/build-all.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
